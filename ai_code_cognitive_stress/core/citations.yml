# Citations registry — single source of truth for all research references
# surfaced in the rendered stress-profile report.
#
# Every metric threshold, weight, and recommendation in the output must be
# traceable to an entry here. Add new entries before referencing them in
# code; never let a metric appear in the UI with a bare number.
#
# Schema:
#   - key:       short identifier used in code and the rendered HTML
#     authors:   "Last, F. & Last, F."
#     year:      <int>
#     title:     "..."
#     venue:     "Journal name, vol(issue), pages"
#     doi:       "10...." or null
#     supports:  list of one-line claims this citation backs

