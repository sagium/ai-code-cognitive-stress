# Span-of-control precedents across professions — prior regimes where automation
# did NOT reduce a single human's work but multiplied the concurrent
# output/processes they must review and steer, each with a documented fatigue or
# quality-loss cost. These ground the "one operator, many parallel agents"
# framing by analogy: the fan-out ceiling is a recurring, cross-domain finding.
