name: widget

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: widget-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The macOS install path can't be tested without a Mac — these are real Macs.
  install-macos:
    runs-on: macos-latest
    name: Übersicht install (macOS)
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      # The exact path install.py targets: Path.home()/Library/Application Support/…
      - name: Resolve Übersicht widgets dir
        run: echo "WIDGETS_DIR=$HOME/Library/Application Support/Übersicht/widgets" >> "$GITHUB_ENV"

      - name: Install package (provides the aicogstress CLI the widget shells out to)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      # install.py's "is Übersicht installed?" gate checks for the Application
      # Support dir (created on Übersicht's first GUI launch), not the .app —
      # so creating the dir is enough to exercise the real install path, and
      # keeps the job hermetic (no flaky cask download / GUI-app install).
      - name: Create Übersicht widgets dir
        run: mkdir -p "$WIDGETS_DIR"

      - name: Install the widget
        run: python install.py --ubersicht

      - name: Assert the widget is a symlink back to the repo source
        run: |
          DEST="$WIDGETS_DIR/ai-code-cognitive-stress.jsx"
          SRC="$PWD/desktop/ubersicht/ai-code-cognitive-stress.jsx"
          test -L "$DEST" || { echo "::error::not a symlink: $DEST"; ls -l "$DEST" || true; exit 1; }
          got=$(python -c 'import os,sys; print(os.path.realpath(sys.argv[1]))' "$DEST")
          want=$(python -c 'import os,sys; print(os.path.realpath(sys.argv[1]))' "$SRC")
          [ "$got" = "$want" ] || { echo "::error::symlink target mismatch: $got != $want"; exit 1; }
          echo "OK: widget linked -> $(readlink "$DEST")"

      - name: Re-install is an idempotent no-op
        run: python install.py --ubersicht

      # A fresh runner has no agent-coding history, so the card would be empty.
      # Seed deterministic Claude Code sessions so the CLI exercises the real
      # ingest → aggregate → metrics → render pipeline on macOS.
      - name: Seed synthetic session data
        run: python scripts/ci_seed_session.py --today "$(date -u +%F)"

      - name: The CLI the widget runs works on macOS and emits a card
        run: aicogstress --emit-html-card | grep -q 'class="cogstress"'

      - name: Uninstall removes the widget
        run: |
          python install.py --ubersicht --uninstall
          DEST="$WIDGETS_DIR/ai-code-cognitive-stress.jsx"
          test ! -e "$DEST" || { echo "::error::still present after uninstall: $DEST"; exit 1; }
          echo "OK: widget removed"

  # The Windows WebView2 host — the thin PS 5.1 host that mirrors the KDE and
  # Übersicht hosts. Exercises: DLL fetch, install.py --windows, CLI smoke,
  # and the full engine-init + card-injection + height-bridge via -SelfTest.
  install-windows:
    runs-on: windows-latest
    name: WebView2 install (Windows)
    # Additive: failures here don't block Linux/macOS jobs.
    continue-on-error: false

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      # Ensure the WebView2 Evergreen Runtime is present. Windows 11 ships
      # it pre-installed; Windows 10 gets it via Windows Update. The
      # windows-latest runner (currently Server 2022) may not have it — check
      # the registry and silently install the bootstrapper if missing.
      # This network call is CI-only; the runtime host makes no network calls.
      - name: Ensure WebView2 Evergreen Runtime
        shell: powershell
        run: |
          $regPath = "HKLM:\SOFTWARE\WOW6432Node\Microsoft\EdgeUpdate\Clients\{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}"
          $pv = try { (Get-ItemProperty $regPath -ErrorAction Stop).pv } catch { $null }
          if ($pv -and $pv -ne "0.0.0.0") {
            Write-Host "WebView2 Runtime already installed (version: $pv)"
          } else {
            Write-Host "WebView2 Runtime not found - downloading Evergreen bootstrapper..."
            $bootstrap = "$env:TEMP\MicrosoftEdgeWebview2Setup.exe"
            Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" `
              -OutFile $bootstrap -UseBasicParsing
            Start-Process $bootstrap -ArgumentList "/silent /install" -Wait
            Write-Host "WebView2 Runtime installed."
          }

      # Vendor the WebView2 managed DLLs (net45 build from NuGet).
      # Network use is limited to this step — the runtime host makes no calls.
      - name: Fetch WebView2 managed DLLs
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File desktop\windows\fetch-webview2.ps1

      - name: Install package (provides the aicogstress CLI)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      # Seed synthetic session data so the CLI has something to render.
      - name: Seed synthetic session data
        shell: powershell
        run: |
          $today = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd")
          python scripts/ci_seed_session.py --today $today

      - name: Install the widget
        run: python install.py --windows

      # Assert install.py created the expected artifacts.
      - name: Assert widget files and Startup launcher exist
        shell: powershell
        run: |
          $dest = Join-Path $env:LOCALAPPDATA "Programs\aicogstress\widget"
          $hostPs1 = Join-Path $dest "cognitive-stress.ps1"
          $launcher = Join-Path $env:APPDATA "Microsoft\Windows\Start Menu\Programs\Startup\aicogstress-widget.vbs"
          $ok = $true
          if (-not (Test-Path $hostPs1)) {
            Write-Host "::error::Widget host not found: $hostPs1"
            $ok = $false
          } else {
            Write-Host "OK: widget host present at $hostPs1"
          }
          if (-not (Test-Path $launcher)) {
            Write-Host "::error::Startup launcher not found: $launcher"
            $ok = $false
          } else {
            Write-Host "OK: Startup launcher present at $launcher"
          }
          if (-not $ok) { exit 1 }

      # Smoke test: the CLI emits a valid card.
      - name: CLI emits a valid card
        shell: powershell
        run: |
          # Out-String joins the captured lines into one string — without it,
          # `-notmatch` filters the line array (returning the non-matching
          # lines) instead of yielding a single boolean.
          $out = aicogstress --emit-html-card | Out-String
          if ($out -notmatch 'class="cogstress"') {
            Write-Host "::error::--emit-html-card output did not contain class=`"cogstress`""
            Write-Host $out
            exit 1
          }
          Write-Host "OK: card output contains class=`"cogstress`""

      # Generate the demo card HTML for the -SelfTest step.
      - name: Generate demo card
        run: python scripts/generate_demo_report.py --dayview-card card.html

      # End-to-end self-test: initialise WebView2, inject the card, confirm
      # the height bridge reports a real measurement.
      # Uses powershell.exe (5.1) — NOT pwsh — to match the real install path.
      - name: Widget self-test (WebView2 engine init + card injection + height bridge)
        shell: cmd
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass ^
            -File desktop\windows\cognitive-stress.ps1 ^
            -SelfTest -CardFile card.html
          if %ERRORLEVEL% NEQ 0 (
            echo ::error::Widget self-test failed
            exit /b 1
          )

      - name: Uninstall removes the widget
        run: python install.py --windows --uninstall

      - name: Assert uninstall cleaned up
        shell: powershell
        run: |
          $dest    = Join-Path $env:LOCALAPPDATA "Programs\aicogstress\widget"
          $launcher = Join-Path $env:APPDATA "Microsoft\Windows\Start Menu\Programs\Startup\aicogstress-widget.vbs"
          $ok = $true
          if (Test-Path $dest) {
            Write-Host "::error::Widget dest dir still present after uninstall: $dest"
            $ok = $false
          } else {
            Write-Host "OK: dest dir removed"
          }
          if (Test-Path $launcher) {
            Write-Host "::error::Startup launcher still present after uninstall: $launcher"
            $ok = $false
          } else {
            Write-Host "OK: Startup launcher removed"
          }
          if (-not $ok) { exit 1 }

  # The widget UI *is* the card HTML (ai_code_cognitive_stress/output/widget_card.py), which the
  # Übersicht host injects verbatim — so headless Chromium renders the real
  # thing, no Mac required.
  ui-render:
    runs-on: ubuntu-latest
    name: Widget UI render (headless Chromium)
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install package + Playwright
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Generate the deterministic demo card
        run: python scripts/generate_demo_report.py --dayview-card desktop/ubersicht/card.html

      - name: Render preview.html, assert structure, screenshot
        run: python scripts/ci_widget_ui_check.py

      - name: Upload widget screenshot
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: widget-card
          path: widget-card.png
          if-no-files-found: warn
